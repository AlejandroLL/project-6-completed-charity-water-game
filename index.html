<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Water Quest</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  
  <div class ="logo">
    <img src="img/cw_logo_horizontal.png" alt="Water Quest Logo">
  </div>
  <div class="main-wrapper">
    <!-- Left sidebar (progress jerrycan) temporarily disabled for layout comparison.
    <div class="sidebar-left">
      <div class="progress-jerrycan">
          <div class ="jerrycan-bg"></div>
          <div id="progress-fill" class="progress-fill"></div>
      </div>
    </div>
    -->

    <div class="game-container">
      <h1>Water Quest</h1>
      <p class="game-instructions">Collect 20 items to complete the game!</p>
      <div class="stats">
        <p>Cans Collected: <span id="current-cans">0</span></p>
        <p>Time Left: <span id="timer">5</span>s</p>
      </div>
      <div class="difficulty-controls">
        <label for="difficulty-select">Difficulty:</label>
        <select id="difficulty-select" name="difficulty">
          <option value="easy">Easy</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>
      <div id="achievements" class="achievement"></div>
      <div class="game-grid"></div>
      <button id="start-game">Start Game</button>
    </div>

    <div class="sidebar-right">
  <h3>Achievements</h3>
  <div class="badge-container">
    
  </div>
  <button id="view-achievements">View</button>
</div>

  <div id="achievement-modal" class="achievement-modal" hidden>
    <div class="achievement-modal-content">
      <button class="achievement-modal-close" id="close-achievement-modal" aria-label="Close modal">✕</button>
      <div class="achievement-slide-container">
        <div id="achievement-slide" class="achievement-slide"></div>
      </div>
      <div class="achievement-controls">
        <button class="carousel-nav prev" id="prev-achievement" aria-label="Previous achievement">❮</button>
        <div class="carousel-counter">
          <span id="achievement-counter">1</span> / <span id="achievement-total">10</span>
        </div>
        <button class="carousel-nav next" id="next-achievement" aria-label="Next achievement">❯</button>
      </div>
    </div>
  </div>

  </div>
    
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="script.js" defer></script>
  <div class="instructions">
    <button
      id="instructions-toggle"
      class="instructions-toggle"
      type="button"
      aria-expanded="false"
      aria-controls="instructions-panel" 
    >
      <span>How to Play</span>
      <span class="instructions-icon" aria-hidden="true">+</span>
    </button>
    <div id="instructions-panel" class="instructions-panel" hidden>
      <p>Collect at least 20 cans before the timer runs out to win.</p>
      <p>You can click the jerry can icon multiple times before it disappears.</p>
    </div> 
  </div> 

  <footer class="site-footer">
    <p class="footer-title">Support charity: water</p>
    <div class="footer-links">
      <a href="https://www.charitywater.org/" target="_blank" rel="noopener noreferrer">Visit Website</a>
      <a href="https://www.charitywater.org/donate" target="_blank" rel="noopener noreferrer">Donate</a>
      <a href="https://www.charitywater.org/fundraise" target="_blank" rel="noopener noreferrer">Fundraise</a>
      <button id="share-game" type="button">Share This Game</button>
    </div>
    <p id="share-status" class="share-status" aria-live="polite"></p>
  </footer>
</body>  
</html>
